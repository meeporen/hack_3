<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сбербанк · Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/sber.css">
<style>
body {
  font-family: 'Inter', var(--sans);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg);
  /* Subtle gradient glow in background */
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(2,136,214,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%, rgba(1,161,4,0.10) 0%, transparent 60%);
}

.auth-container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* Logo block */
.auth-logo {
  text-align: center;
  margin-bottom: 32px;
}
.auth-logo img {
  height: 44px;
  width: auto;
}
.auth-logo-tagline {
  font-size: 12px;
  color: var(--hint);
  margin-top: 8px;
  letter-spacing: 0.05em;
}

/* Tabs */
.auth-tabs {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 20px;
  gap: 4px;
}
.auth-tab {
  flex: 1;
  padding: 9px;
  border: none;
  border-radius: calc(var(--radius) - 2px);
  background: transparent;
  color: var(--muted);
  font-family: 'Inter', var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.auth-tab.active {
  background: linear-gradient(90deg, var(--grad-mid1), var(--grad-mid2));
  color: #fff;
}

/* Forms */
.auth-form { display: none; }
.auth-form.active { display: block; }

.auth-form .card {
  padding: 28px;
}

/* Divider */
.form-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 18px 0;
  color: var(--hint);
  font-size: 12px;
}
.form-divider::before,
.form-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Password toggle */
.input-wrap {
  position: relative;
}
.input-wrap input { padding-right: 44px; }
.toggle-pass {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--hint);
  padding: 4px;
  display: flex;
  align-items: center;
}
.toggle-pass:hover { color: var(--muted); }

/* Alert */
#authAlert { display: none; }

/* Footer note */
.auth-footer {
  text-align: center;
  font-size: 11px;
  color: var(--hint);
  margin-top: 20px;
  line-height: 1.8;
}
.auth-footer a { color: var(--muted); }

/* Gradient bottom line on card */
.card.grad-line {
  position: relative;
  overflow: hidden;
}
.card.grad-line::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--grad-start), var(--grad-mid1), var(--grad-mid3), var(--grad-end));
  border-radius: 0 0 var(--radius) var(--radius);
}
</style>
</head>
<body>

<div class="auth-container">

  <!-- Logo -->
  <div class="auth-logo">
    <img src="assets/images/sber-logo.svg" alt="Сбербанк" class="sber-logo">
    <div class="auth-logo-tagline">Converter Agent Platform</div>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Войти</button>
    <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Регистрация</button>
  </div>

  <!-- Alert -->
  <div id="authAlert" class="alert"></div>

  <!-- LOGIN -->
  <div class="auth-form active" id="form-login">
    <div class="card grad-line">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="loginEmail" placeholder="ivan@sber.ru" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="input-wrap">
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"
                 onkeydown="if(event.key==='Enter') doLogin()">
          <button class="toggle-pass" onclick="togglePass('loginPassword', this)" type="button">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:4px">
        Войти
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <p style="text-align:center;font-size:11px;color:var(--hint);margin-top:14px">
        Демо: <code style="color:var(--muted)">ivan@sber.ru</code> / <code style="color:var(--muted)">password</code>
      </p>
    </div>
  </div>

  <!-- REGISTER -->
  <div class="auth-form" id="form-register">
    <div class="card grad-line">
      <div class="form-group">
        <label class="form-label">Имя и фамилия</label>
        <input type="text" id="regName" placeholder="Иван Иванов" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="regEmail" placeholder="you@sber.ru" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="input-wrap">
          <input type="password" id="regPassword" placeholder="Минимум 6 символов">
          <button class="toggle-pass" onclick="togglePass('regPassword', this)" type="button">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Повторите пароль</label>
        <div class="input-wrap">
          <input type="password" id="regConfirm" placeholder="••••••••"
                 onkeydown="if(event.key==='Enter') doRegister()">
          <button class="toggle-pass" onclick="togglePass('regConfirm', this)" type="button">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">
        Создать аккаунт
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <p style="text-align:center;font-size:11px;color:var(--hint);margin-top:14px">
        После регистрации можно загрузить фото профиля
      </p>
    </div>
  </div>

  <div class="auth-footer">
    &copy; 2026 ПАО Сбербанк &nbsp;·&nbsp;
    <a href="#">Конфиденциальность</a> &nbsp;·&nbsp;
    <a href="#">Поддержка</a>
  </div>

</div>

<script src="assets/js/storage.js"></script>
<script src="assets/js/auth.js"></script>
<script>
// Redirect if already logged in
if (getSession()) {
  window.location.href = 'dashboard.html';
}

function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.style.color = input.type === 'text' ? 'var(--accent2)' : 'var(--hint)';
}
</script>
</body>
</html>
